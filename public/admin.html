<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员仪表盘 - 深圳高中生社区</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- 移动端适配 -->
    <link rel="stylesheet" href="/css/mobile.css" media="screen and (max-width: 768px)">
    <script src="/js/mobile.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ========== 管理员页面特有样式 ========== */
        .admin-container {
            max-width: 1200px;
            margin: 32px auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #eef2f6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1E88E5;
        }

        .stat-label {
            color: #6c757d;
            margin-top: 8px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #eef2f6;
        }

        .chart-card h3 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            text-align: center;
        }

        canvas {
            max-height: 300px;
            width: 100%;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eef2f6;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #6c757d;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 30px;
        }

        .tab-btn.active {
            color: #1E88E5;
            background: #e9f0fe;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #eef2f6;
        }

        .tab-content.active {
            display: block;
        }

        .list-item {
            border-bottom: 1px solid #f0f2f5;
            padding: 16px;
            margin-bottom: 8px;
        }

        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #6c757d;
        }

        .item-content {
            margin-bottom: 8px;
        }

        .item-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-sm {
            background: #f0f2f5;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .btn-sm.primary {
            background: #1E88E5;
            color: white;
        }

        .btn-sm.danger {
            background: #e53e3e;
            color: white;
        }

        .reply-form {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .reply-form input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            background: #e9ecef;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-resolved {
            background: #d4edda;
            color: #155724;
        }

        .badge-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-read {
            background: #cfe2ff;
            color: #004085;
        }

        /* 圈子申请特有样式 */
        .participants-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }

        .participant-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f0f2f5;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .participant-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        .participant-name {
            font-weight: 500;
        }

        .initiator-badge {
            background: #1E88E5;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.6rem;
            margin-left: 4px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        /* ========== 顶部栏和侧边栏（与 index 一致） ========== */
        /* 顶部铃铛链接 */
        .notifications-icon {
            position: relative;
            margin-left: 16px;
            font-size: 1.4rem;
            color: #6c757d;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .notif-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 0.7rem;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .top-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            margin-right: 20px;
            color: #4a5568;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1E88E5;
            text-decoration: none;
            margin-right: auto;
        }

        .search-area {
            display: flex;
            align-items: center;
            background: #f1f3f5;
            border-radius: 24px;
            padding: 4px 12px;
            width: 260px;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 8px 0;
        }

        .search-area button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #6c757d;
        }

        /* 关于链接 */
        .about-link {
            margin-left: 16px;
            color: #4a5568;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .about-link:hover {
            color: #1E88E5;
        }

        .about-link i {
            margin-right: 4px;
        }

        #sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            bottom: 0;
            width: 260px;
            background: white;
            border-right: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            z-index: 99;
            overflow-x: hidden;
        }

        #sidebar.collapsed {
            width: 70px;
        }

        #sidebar.collapsed .sidebar-user-info,
        #sidebar.collapsed .sidebar-link span {
            display: none;
        }

        #sidebar.collapsed .sidebar-logout {
            font-size: 0;
            padding: 8px;
        }

        #sidebar.collapsed .sidebar-logout::before {
            content: "🚪";
            font-size: 1.2rem;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            padding: 20px 16px;
            border-bottom: 1px solid #eef2f6;
            cursor: pointer;
        }

        .sidebar-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-avatar i {
            font-size: 48px;
            color: #1E88E5;
        }

        .sidebar-user-info {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        .sidebar-nickname {
            font-weight: 600;
            font-size: 1rem;
        }

        .sidebar-email {
            font-size: 0.7rem;
            color: #6c757d;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            text-decoration: none;
            color: #4a5568;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .sidebar-link i {
            width: 28px;
            font-size: 1.2rem;
            text-align: center;
        }

        .sidebar-link span {
            margin-left: 12px;
        }

        .sidebar-link:hover {
            background: #f0f2f5;
        }

        .sidebar-link.active {
            background: #e9f0fe;
            color: #1E88E5;
        }

        .notif-dot {
            color: #e53e3e;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #eef2f6;
        }

        .sidebar-logout {
            width: 100%;
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: #e53e3e;
            border-radius: 8px;
            text-align: center;
        }

        .sidebar-logout:hover {
            background: #ffe5e5;
        }

        body {
            padding-top: 60px;
            margin-left: 260px;
            transition: margin-left 0.3s ease;
        }

        body.sidebar-collapsed {
            margin-left: 70px;
        }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            body {
                margin-left: 0;
            }

            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 260px !important;
            }

            #sidebar.open-mobile {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body id="appBody">
    <!-- 顶部栏 -->
    <div class="top-bar-container">
        <div class="top-bar">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="logo">深圳高中生社区</a>
            <div class="search-area">
                <input type="text" placeholder="搜索帖子、用户..." id="searchInput">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <!-- 新增：关于按钮 -->
            <a href="/about.html" class="about-link" id="aboutLink">
                <i class="fas fa-info-circle"></i> 关于
            </a>
            <!-- 顶部铃铛：改为链接跳转通知页面 -->
            <a href="/notifications.html" class="notifications-icon" id="notifLink">
                <i class="fas fa-bell"></i>
                <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
            </a>
        </div>
    </div>

    <!-- 侧边栏 -->
    <div id="sidebar">
        <div class="sidebar-user" id="sidebarUserBtn">
            <div class="sidebar-avatar" id="sidebarAvatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="sidebar-user-info">
                <div class="sidebar-nickname" id="sidebarNickname">未登录</div>
                <div class="sidebar-email" id="sidebarEmail"></div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link" title="首页"><i class="fas fa-home"></i><span>首页</span></a>
            <a href="learning.html" class="sidebar-link" title="学习"><i
                    class="fas fa-graduation-cap"></i><span>学习</span></a>
            <a href="circles.html" class="sidebar-link" title="圈子">
                <i class="fas fa-users"></i><span>圈子</span>
            </a>
            <a href="/study.html" class="sidebar-link" title="自习室">
                <i class="fas fa-clock"></i><span>自习室</span>
            </a>
            <a href="feed.html" class="sidebar-link" title="动态"><i class="fas fa-bolt"></i><span>动态</span></a>
            <a href="#" class="sidebar-link" title="生活"><i class="fas fa-life-ring"></i><span>生活</span></a>
            <a href="#" class="sidebar-link" title="社团"><i class="fas fa-users"></i><span>社团</span></a>
            <a href="#" class="sidebar-link" title="升学"><i class="fas fa-chart-line"></i><span>升学</span></a>
            <a href="profile.html" class="sidebar-link" title="个人主页"><i class="fas fa-user"></i><span>个人主页</span></a>
            <a href="settings.html" class="sidebar-link" title="设置"><i class="fas fa-cog"></i><span>设置</span></a>
            <a href="admin.html" class="sidebar-link active" title="管理后台"><i
                    class="fas fa-shield-alt"></i><span>管理后台</span></a>
            <a href="feedback.html" class="sidebar-link" id="sidebarFeedbackLink" title="反馈">
                <i class="fas fa-comment-dots"></i><span>反馈</span>
            </a>
            <a href="/notifications.html" class="sidebar-link" id="sidebarNotifLink" title="通知">
                <i class="fas fa-bell"></i><span>通知</span>
                <span class="notif-dot" id="sidebarNotifDot" style="display:none;">●</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="sidebar-logout" id="sidebarLogoutBtn">退出登录</button>
        </div>
    </div>

    <div class="container admin-container">
        <h1>管理员仪表盘</h1>
        <div id="statsContainer" class="stats-grid">加载中...</div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <div class="chart-card">
                <h3>每日活跃用户 (DAU)</h3>
                <canvas id="dauChart" width="400" height="300"></canvas>
            </div>
            <div class="chart-card">
                <h3>每日发帖趋势</h3>
                <canvas id="postsChart" width="400" height="300"></canvas>
            </div>
            <div class="chart-card">
                <h3>每日举报趋势</h3>
                <canvas id="reportsChart" width="400" height="300"></canvas>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="reports">举报受理</button>
            <button class="tab-btn" data-tab="feedbacks">反馈受理</button>
            <button class="tab-btn" data-tab="circle-applications">圈子申请</button>
        </div>
        <div id="reportsTab" class="tab-content active">
            <div id="reportsList">加载中...</div>
        </div>
        <div id="feedbacksTab" class="tab-content">
            <div id="feedbacksList">加载中...</div>
        </div>
        <div id="circleApplicationsTab" class="tab-content">
            <div id="circleApplicationsList">加载中...</div>
        </div>
    </div>

    <script>
        window.API_BASE = window.API_BASE || '/api';
        let token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        // ---------- 侧边栏展开/收起 ----------
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('menuToggle');
        const body = document.getElementById('appBody');
        const isExpanded = localStorage.getItem('sidebarExpanded') !== 'false';
        if (!isExpanded) {
            sidebar.classList.add('collapsed');
            body.classList.add('sidebar-collapsed');
        } else {
            sidebar.classList.remove('collapsed');
            body.classList.remove('sidebar-collapsed');
        }
        toggleBtn.addEventListener('click', () => {
            const currentlyExpanded = !sidebar.classList.contains('collapsed');
            if (currentlyExpanded) {
                sidebar.classList.add('collapsed');
                body.classList.add('sidebar-collapsed');
                localStorage.setItem('sidebarExpanded', 'false');
            } else {
                sidebar.classList.remove('collapsed');
                body.classList.remove('sidebar-collapsed');
                localStorage.setItem('sidebarExpanded', 'true');
            }
        });

        // ---------- 用户信息 ----------
        const avatarDiv = document.getElementById('sidebarAvatar');
        const nicknameSpan = document.getElementById('sidebarNickname');
        const emailSpan = document.getElementById('sidebarEmail');
        async function updateSidebarUser() {
            if (!token) {
                nicknameSpan.innerText = '未登录';
                emailSpan.innerText = '';
                avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
                return;
            }
            try {
                const res = await fetch(`${window.API_BASE}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    nicknameSpan.innerText = user.nickname || '用户';
                    emailSpan.innerText = user.email || '';
                    if (user.avatar_url) {
                        avatarDiv.innerHTML = `<img src="${user.avatar_url}" alt="头像">`;
                    } else {
                        avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
                    }
                }
            } catch (e) { console.warn(e); }
        }
        updateSidebarUser();
        document.getElementById('sidebarUserBtn')?.addEventListener('click', () => {
            window.location.href = '/profile.html';
        });

        // ---------- 未读小红点 ----------
        async function updateNotifDot() {
            if (!token) return;
            try {
                const res = await fetch(`${window.API_BASE}/notifications?page=1&limit=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const unreadCount = data.unreadCount || 0;
                const topBadge = document.getElementById('notifBadge');
                const sidebarDot = document.getElementById('sidebarNotifDot');
                if (topBadge) {
                    if (unreadCount > 0) {
                        topBadge.style.display = 'flex';
                        topBadge.innerText = unreadCount > 99 ? '99+' : unreadCount;
                    } else {
                        topBadge.style.display = 'none';
                    }
                }
                if (sidebarDot) {
                    sidebarDot.style.display = unreadCount > 0 ? 'inline-block' : 'none';
                }
            } catch (e) { }
        }
        updateNotifDot();
        if (token) setInterval(updateNotifDot, 30000);

        // ---------- 退出登录 ----------
        document.getElementById('sidebarLogoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        // ---------- 搜索 ----------
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchInput');
        searchBtn?.addEventListener('click', () => {
            const keyword = searchInput.value.trim();
            if (keyword) window.location.href = `/search.html?q=${encodeURIComponent(keyword)}`;
            else alert('请输入搜索关键词');
        });
        searchInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        // ---------- 管理员功能 ----------
        let dauChart, postsChart, reportsChart;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        async function loadStats() {
            try {
                const res = await fetch(`${window.API_BASE}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 403) {
                    alert('无管理员权限，将跳转首页');
                    window.location.href = '/';
                    return;
                }
                const stats = await res.json();
                renderStats(stats);
            } catch (err) {
                console.error(err);
                document.getElementById('statsContainer').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        function renderStats(stats) {
            const container = document.getElementById('statsContainer');
            container.innerHTML = `
                <div class="stat-card"><div class="stat-number">${stats.totalUsers}</div><div class="stat-label">注册用户</div></div>
                <div class="stat-card"><div class="stat-number">${stats.newUsersToday}</div><div class="stat-label">今日新增用户</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalPosts}</div><div class="stat-label">总帖子数</div></div>
                <div class="stat-card"><div class="stat-number">${stats.newPostsToday}</div><div class="stat-label">今日新帖</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalReplies}</div><div class="stat-label">总回复数</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalLikes}</div><div class="stat-label">总点赞数</div></div>
                <div class="stat-card"><div class="stat-number">${stats.totalFavorites}</div><div class="stat-label">总收藏数</div></div>
            `;
        }

        async function loadCharts() {
            try {
                const res = await fetch(`${window.API_BASE}/admin/daily-stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('获取图表数据失败');
                const data = await res.json();
                renderCharts(data);
            } catch (err) {
                console.error(err);
                document.querySelectorAll('.chart-card').forEach(card => card.style.opacity = '0.5');
            }
        }

        function renderCharts(data) {
            const dates = data.dates;
            const dauData = data.dau;
            const postsData = data.posts;
            const reportsData = data.reports;
            if (dauChart) dauChart.destroy();
            if (postsChart) postsChart.destroy();
            if (reportsChart) reportsChart.destroy();
            const ctxDau = document.getElementById('dauChart').getContext('2d');
            const ctxPosts = document.getElementById('postsChart').getContext('2d');
            const ctxReports = document.getElementById('reportsChart').getContext('2d');
            dauChart = new Chart(ctxDau, {
                type: 'line',
                data: { labels: dates, datasets: [{ label: '活跃用户数', data: dauData, borderColor: '#1E88E5', backgroundColor: 'rgba(30,136,229,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
            postsChart = new Chart(ctxPosts, {
                type: 'line',
                data: { labels: dates, datasets: [{ label: '发帖数', data: postsData, borderColor: '#f5b042', backgroundColor: 'rgba(245,176,66,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
            reportsChart = new Chart(ctxReports, {
                type: 'line',
                data: { labels: dates, datasets: [{ label: '举报数', data: reportsData, borderColor: '#e53e3e', backgroundColor: 'rgba(229,62,62,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: true }
            });
        }

        async function loadReports() {
            const container = document.getElementById('reportsList');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${window.API_BASE}/admin/reports`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const reports = data.reports || [];
                if (!reports.length) {
                    container.innerHTML = '<div class="loading">暂无举报记录</div>';
                    return;
                }
                container.innerHTML = reports.map(r => `
                    <div class="list-item" data-id="${r.id}">
                        <div class="item-meta">
                            <span>举报人：${escapeHtml(r.reporter_nickname)}</span>
                            <span>目标：${r.target_type} ID:${r.target_id}</span>
                            <span>类型：${r.reason_type}</span>
                            <span>状态：<span class="badge badge-${r.status}">${getStatusText(r.status)}</span></span>
                        </div>
                        <div class="item-content">说明：${escapeHtml(r.reason || '无')}</div>
                        <div class="item-meta">提交时间：${new Date(r.created_at).toLocaleString()}</div>
                        ${r.status === 'pending' ? `
                            <div class="item-actions">
                                <button class="btn-sm primary resolve-btn" data-id="${r.id}" data-action="resolve">通过（删除内容）</button>
                                <button class="btn-sm danger reject-btn" data-id="${r.id}" data-action="reject">驳回</button>
                            </div>
                        ` : `<div class="item-actions"><span class="badge">已处理</span></div>`}
                    </div>
                `).join('');
                document.querySelectorAll('.resolve-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleReport(parseInt(btn.dataset.id), 'resolve'));
                });
                document.querySelectorAll('.reject-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleReport(parseInt(btn.dataset.id), 'reject'));
                });
            } catch (err) {
                container.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        async function handleReport(reportId, action) {
            if (!confirm(`确定要${action === 'resolve' ? '通过（删除违规内容）' : '驳回'}此举报吗？`)) return;
            try {
                const res = await fetch(`${window.API_BASE}/admin/reports/${reportId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ action })
                });
                if (res.ok) {
                    alert('处理成功');
                    loadReports();
                    loadCharts();
                } else {
                    const err = await res.json();
                    alert(err.error || '处理失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        async function loadFeedbacks() {
            const container = document.getElementById('feedbacksList');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${window.API_BASE}/admin/feedbacks`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const feedbacks = data.feedbacks || [];
                if (!feedbacks.length) {
                    container.innerHTML = '<div class="loading">暂无反馈记录</div>';
                    return;
                }
                container.innerHTML = feedbacks.map(f => `
                    <div class="list-item" data-id="${f.id}">
                        <div class="item-meta">
                            <span>用户：${escapeHtml(f.user_nickname)}</span>
                            <span>状态：<span class="badge badge-${f.status}">${getFeedbackStatusText(f.status)}</span></span>
                        </div>
                        <div class="item-content">${escapeHtml(f.content)}</div>
                        <div class="item-meta">提交时间：${new Date(f.created_at).toLocaleString()}</div>
                        ${f.status === 'pending' ? `
                            <div class="reply-form">
                                <input type="text" id="replyInput_${f.id}" placeholder="输入回复内容...">
                                <button class="btn-sm primary reply-submit" data-id="${f.id}">回复并标记已读</button>
                            </div>
                        ` : f.reply ? `<div class="item-content">管理员回复：${escapeHtml(f.reply)}</div>` : ''}
                    </div>
                `).join('');
                document.querySelectorAll('.reply-submit').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const feedbackId = parseInt(btn.dataset.id);
                        const replyInput = document.getElementById(`replyInput_${feedbackId}`);
                        const reply = replyInput.value.trim();
                        if (!reply) { alert('请输入回复内容'); return; }
                        try {
                            const res = await fetch(`${window.API_BASE}/admin/feedbacks/${feedbackId}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ reply, action: 'resolve' })
                            });
                            if (res.ok) {
                                alert('回复成功');
                                loadFeedbacks();
                            } else {
                                const err = await res.json();
                                alert(err.error || '处理失败');
                            }
                        } catch (err) { alert('网络错误'); }
                    });
                });
            } catch (err) {
                container.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        // ---------- 圈子申请受理 ----------
        async function loadCircleApplications() {
            const container = document.getElementById('circleApplicationsList');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${window.API_BASE}/admin/circle-applications`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const applications = data.applications || [];
                if (!applications.length) {
                    container.innerHTML = '<div class="loading">暂无待审批的圈子申请</div>';
                    return;
                }
                container.innerHTML = applications.map(app => {
                    const participants = app.participants || [];
                    const participantsHtml = participants.map(p => `
                        <span class="participant-item">
                            ${p.avatar_url ? `<img src="${escapeHtml(p.avatar_url)}" class="participant-avatar">` : '<i class="fas fa-user-circle"></i>'}
                            <span class="participant-name">${escapeHtml(p.nickname)}</span>
                            ${p.id === app.initiator_id ? '<span class="initiator-badge">发起人</span>' : ''}
                        </span>
                    `).join('');
                    return `
                        <div class="list-item" data-id="${app.id}">
                            <div class="item-meta">
                                <span>圈子名称：<strong>${escapeHtml(app.name)}</strong></span>
                                <span>发起人：${escapeHtml(app.initiator_nickname)}</span>
                                <span>申请时间：${new Date(app.created_at).toLocaleString()}</span>
                            </div>
                            <div class="item-content">简介：${escapeHtml(app.description || '无')}</div>
                            <div class="participants-list">
                                参与者：${participantsHtml}
                            </div>
                            <div class="item-actions">
                                <button class="btn-sm primary approve-btn" data-id="${app.id}">通过</button>
                                <button class="btn-sm danger reject-btn" data-id="${app.id}">驳回</button>
                            </div>
                        </div>
                    `;
                }).join('');
                document.querySelectorAll('.approve-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleCircleApplication(parseInt(btn.dataset.id), 'approve'));
                });
                document.querySelectorAll('.reject-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleCircleApplication(parseInt(btn.dataset.id), 'reject'));
                });
            } catch (err) {
                container.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            }
        }

        async function handleCircleApplication(appId, action) {
            if (!confirm(`确定要${action === 'approve' ? '通过' : '驳回'}此圈子申请吗？`)) return;
            try {
                const res = await fetch(`${window.API_BASE}/admin/circle-applications/${appId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ action })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(action === 'approve' ? '圈子创建成功' : '已驳回申请');
                    loadCircleApplications();
                } else {
                    alert(data.error || '操作失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        function getStatusText(status) {
            switch (status) {
                case 'pending': return '待处理';
                case 'resolved': return '已处理';
                case 'rejected': return '已驳回';
                default: return status;
            }
        }
        function getFeedbackStatusText(status) {
            switch (status) {
                case 'pending': return '待回复';
                case 'read': return '已读';
                case 'resolved': return '已解决';
                default: return status;
            }
        }

        // 标签页切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabs = {
            reports: document.getElementById('reportsTab'),
            feedbacks: document.getElementById('feedbacksTab'),
            'circle-applications': document.getElementById('circleApplicationsTab')
        };
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                Object.values(tabs).forEach(t => t.classList.remove('active'));
                tabs[tab].classList.add('active');
                // 切换到圈子申请时自动加载数据
                if (tab === 'circle-applications') {
                    loadCircleApplications();
                }
            });
        });

        // 初始加载
        loadStats();
        loadCharts();
        loadReports();
        loadFeedbacks();
        // 预加载圈子申请（如果默认标签页不是它，可以不加载，但这里预先准备）
    </script>
</body>

</html>
