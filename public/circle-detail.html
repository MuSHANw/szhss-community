<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>圈子详情 - 深圳高中生社区</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- 移动端适配 -->
    <link rel="stylesheet" href="/css/mobile.css" media="screen and (max-width: 768px)">
    <script src="/js/mobile.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== 全局样式（与 index 一致） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
            background-color: #F5F7FA;
            color: #1f2d3d;
            line-height: 1.5;
            padding-top: 60px;
            margin-left: 260px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
            position: relative;
        }

        body.sidebar-collapsed {
            margin-left: 70px;
        }

        /* 背景装饰 */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-decorations .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%231E88E5" fill-opacity="0.08" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,186.7C672,192,768,224,864,229.3C960,235,1056,213,1152,192C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            background-size: cover;
            opacity: 0.5;
        }

        .bg-decorations .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(30, 136, 229, 0.05);
        }

        .bg-decorations .circle1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }

        .bg-decorations .circle2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            right: -50px;
        }

        .bg-decorations .circle3 {
            width: 150px;
            height: 150px;
            top: 30%;
            right: 10%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ========== 顶部栏 ========== */
        .top-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            margin-right: 20px;
            color: #4a5568;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1E88E5;
            text-decoration: none;
            margin-right: auto;
        }

        .search-area {
            display: flex;
            align-items: center;
            background: #f1f3f5;
            border-radius: 24px;
            padding: 4px 12px;
            width: 260px;
        }

        .search-area input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            padding: 8px 0;
        }

        .search-area button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #6c757d;
        }

        .about-link {
            margin-left: 16px;
            color: #4a5568;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .about-link:hover {
            color: #1E88E5;
        }

        .about-link i {
            margin-right: 4px;
        }

        .notifications-icon {
            position: relative;
            margin-left: 16px;
            font-size: 1.4rem;
            color: #6c757d;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .notif-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e53e3e;
            color: white;
            font-size: 0.7rem;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== 侧边栏 ========== */
        #sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            bottom: 0;
            width: 260px;
            background: white;
            border-right: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            z-index: 99;
            overflow-x: hidden;
        }

        #sidebar.collapsed {
            width: 70px;
        }

        #sidebar.collapsed .sidebar-user-info,
        #sidebar.collapsed .sidebar-link span {
            display: none;
        }

        #sidebar.collapsed .sidebar-logout {
            font-size: 0;
            padding: 8px;
        }

        #sidebar.collapsed .sidebar-logout::before {
            content: "🚪";
            font-size: 1.2rem;
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            padding: 20px 16px;
            border-bottom: 1px solid #eef2f6;
            cursor: pointer;
        }

        .sidebar-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-avatar i {
            font-size: 48px;
            color: #1E88E5;
        }

        .sidebar-user-info {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
        }

        .sidebar-nickname {
            font-weight: 600;
            font-size: 1rem;
        }

        .sidebar-email {
            font-size: 0.7rem;
            color: #6c757d;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            text-decoration: none;
            color: #4a5568;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .sidebar-link i {
            width: 28px;
            font-size: 1.2rem;
            text-align: center;
        }

        .sidebar-link span {
            margin-left: 12px;
        }

        .sidebar-link:hover {
            background: #f0f2f5;
        }

        .sidebar-link.active {
            background: #e9f0fe;
            color: #1E88E5;
        }

        .notif-dot {
            color: #e53e3e;
            font-size: 0.7rem;
            margin-left: 4px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #eef2f6;
        }

        .sidebar-logout {
            width: 100%;
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
            color: #e53e3e;
            border-radius: 8px;
            text-align: center;
        }

        .sidebar-logout:hover {
            background: #ffe5e5;
        }

        /* ========== 圈子详情页布局 ========== */
        .circle-detail-wrapper {
            display: flex;
            gap: 24px;
            margin: 24px 0;
        }

        .circle-sidebar {
            flex: 1;
            max-width: 300px;
        }

        .circle-main {
            flex: 3;
            min-width: 0;
        }

        /* 圈子信息卡片 */
        .circle-info-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #eef2f6;
            margin-bottom: 20px;
        }

        .circle-cover-large {
            height: 120px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 16px;
            background-color: #e9f0fe;
        }

        .circle-info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .circle-icon-large {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: #1E88E5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .circle-title-section {
            flex: 1;
        }

        .circle-name-large {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .circle-creator {
            font-size: 0.8rem;
            color: #6c757d;
        }

        .circle-desc-large {
            color: #4a5568;
            font-size: 0.9rem;
            margin: 16px 0;
            line-height: 1.5;
        }

        .circle-stats-large {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: #6c757d;
        }

        .circle-actions {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: #1E88E5;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #0b5e8a;
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #4a5568;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #e2e6ea;
        }

        /* 成员列表 */
        .members-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #eef2f6;
        }

        .members-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f5;
        }

        .member-item:last-child {
            border-bottom: none;
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-avatar i {
            font-size: 36px;
            color: #1E88E5;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .member-role {
            font-size: 0.7rem;
            color: #6c757d;
        }

        /* 帖子区域 */
        .posts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .posts-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .sort-btns {
            display: flex;
            gap: 8px;
        }

        .sort-btn {
            background: #f0f2f5;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .sort-btn.active {
            background: #1E88E5;
            color: white;
        }

        .post-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #eef2f6;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .post-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }

        .post-category {
            background: #e9f0fe;
            color: #1E88E5;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .post-time {
            color: #8a9aa8;
        }

        .post-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .post-content {
            color: #4a5568;
            margin-bottom: 16px;
            line-height: 1.5;
            word-break: break-word;
        }

        .post-footer {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.8rem;
            color: #6c757d;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-author img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-author i {
            font-size: 22px;
            color: #1E88E5;
        }

        .post-form {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #eef2f6;
            margin-top: 24px;
        }

        .post-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 12px;
        }

        .post-form button {
            background: #1E88E5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination button {
            background: #f0f2f5;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .pagination button.active {
            background: #1E88E5;
            color: white;
        }

        .loading,
        .error,
        .no-posts {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            color: #6c757d;
        }

        .footer {
            background: white;
            border-top: 1px solid #e9ecef;
            padding: 20px 0;
            text-align: center;
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            body {
                margin-left: 0;
            }

            #sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 260px !important;
            }

            #sidebar.open-mobile {
                transform: translateX(0);
            }

            .circle-detail-wrapper {
                flex-direction: column;
            }

            .circle-sidebar {
                max-width: 100%;
            }

            .search-area {
                width: 180px;
            }
        }
    </style>
</head>

<body id="appBody">

    <!-- 侧边栏 -->

            </div>

        <nav class="sidebar-nav">

            <a href="#" class="sidebar-link" title="社团"><i class="fas fa-users"></i><span>社团</span></a>
            <a href="#" class="sidebar-link" title="升学"><i class="fas fa-chart-line"></i><span>升学</span></a>

        <div class="circle-detail-wrapper" id="circleDetailWrapper">
            <div class="loading">加载中...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 深圳高中生社区 | <a href="/rules.html" style="color:#6c757d;">社区公约</a> | 粤ICP备xxxxxxxx号 | 帮助中心</p>
        </div>
    </footer>

    <script>
        window.API_BASE = window.API_BASE || '/api';

        // ---------- 侧边栏展开/收起 ----------
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('menuToggle');
        const body = document.getElementById('appBody');
        const isExpanded = localStorage.getItem('sidebarExpanded') !== 'false';
        if (!isExpanded) {
            sidebar.classList.add('collapsed');
            body.classList.add('sidebar-collapsed');
        } else {
            sidebar.classList.remove('collapsed');
            body.classList.remove('sidebar-collapsed');
        }
        toggleBtn.addEventListener('click', () => {
            const currentlyExpanded = !sidebar.classList.contains('collapsed');
            if (currentlyExpanded) {
                sidebar.classList.add('collapsed');
                body.classList.add('sidebar-collapsed');
                localStorage.setItem('sidebarExpanded', 'false');
            } else {
                sidebar.classList.remove('collapsed');
                body.classList.remove('sidebar-collapsed');
                localStorage.setItem('sidebarExpanded', 'true');
            }
        });

        // ---------- 用户信息 ----------
        const token = localStorage.getItem('token');
        const avatarDiv = document.getElementById('sidebarAvatar');
        const nicknameSpan = document.getElementById('sidebarNickname');
        const emailSpan = document.getElementById('sidebarEmail');
        async function updateSidebarUser() {
            if (!token) {
                nicknameSpan.innerText = '未登录';
                emailSpan.innerText = '';
                avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
                return;
            }
            try {
                const res = await fetch(`${window.API_BASE}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    nicknameSpan.innerText = user.nickname || '用户';
                    emailSpan.innerText = user.email || '';
                    if (user.avatar_url) {
                        avatarDiv.innerHTML = `<img src="${user.avatar_url}" alt="头像">`;
                    } else {
                        avatarDiv.innerHTML = '<i class="fas fa-user-circle"></i>';
                    }
                }
            } catch (e) { console.warn(e); }
        }
        updateSidebarUser();
        document.getElementById('sidebarUserBtn')?.addEventListener('click', () => {
            window.location.href = '/profile.html';
        });

        // ---------- 未读小红点 ----------
        async function updateNotifDot() {
            if (!token) return;
            try {
                const res = await fetch(`${window.API_BASE}/notifications?page=1&limit=1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const unreadCount = data.unreadCount || 0;
                const topBadge = document.getElementById('notifBadge');
                const sidebarDot = document.getElementById('sidebarNotifDot');
                if (topBadge) {
                    if (unreadCount > 0) {
                        topBadge.style.display = 'flex';
                        topBadge.innerText = unreadCount > 99 ? '99+' : unreadCount;
                    } else {
                        topBadge.style.display = 'none';
                    }
                }
                if (sidebarDot) {
                    sidebarDot.style.display = unreadCount > 0 ? 'inline-block' : 'none';
                }
            } catch (e) { }
        }
        updateNotifDot();
        if (token) setInterval(updateNotifDot, 30000);

        // ---------- 退出登录 ----------
        document.getElementById('sidebarLogoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        // ---------- 顶部搜索 ----------
        const topSearchBtn = document.getElementById('topSearchBtn');
        const topSearchInput = document.getElementById('topSearchInput');
        topSearchBtn?.addEventListener('click', () => {
            const keyword = topSearchInput.value.trim();
            if (keyword) window.location.href = `/search.html?q=${encodeURIComponent(keyword)}`;
            else alert('请输入搜索关键词');
        });
        topSearchInput?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') topSearchBtn.click();
        });

        // ---------- 圈子详情逻辑 ----------
        const urlParams = new URLSearchParams(window.location.search);
        const circleId = urlParams.get('id');
        if (!circleId) {
            document.getElementById('circleDetailWrapper').innerHTML = '<div class="error">缺少圈子ID</div>';
        } else {
            loadCircleDetail(parseInt(circleId));
        }

        let circleData = null;
        let isJoined = false;
        let userRole = null;
        let currentPostPage = 1;
        let currentPostSort = 'latest';
        let postTotalPages = 1;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
        }

        async function loadCircleDetail(id) {
            const wrapper = document.getElementById('circleDetailWrapper');
            try {
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const res = await fetch(`${window.API_BASE}/circles/${id}`, { headers });
                if (!res.ok) throw new Error('圈子不存在');
                const data = await res.json();
                circleData = data.circle;
                const members = data.members;
                isJoined = data.isJoined;
                userRole = data.userRole;

                renderCircleUI(circleData, members);
                loadPosts();
            } catch (err) {
                wrapper.innerHTML = `<div class="error">${err.message}</div>`;
            }
        }

        function renderCircleUI(circle, members) {
            const wrapper = document.getElementById('circleDetailWrapper');
            const coverStyle = circle.banner_url
                ? `style="background-image:url('${escapeHtml(circle.banner_url)}')"`
                : 'style="background: linear-gradient(135deg, #1E88E5, #64B5F6);"';
            const iconHtml = circle.icon_url
                ? `<div class="circle-icon-large" style="background-image:url('${escapeHtml(circle.icon_url)}'); background-size:cover;"></div>`
                : `<div class="circle-icon-large" style="background:#1E88E5;"><i class="fas fa-users"></i></div>`;

            const joinLeaveButton = !token
                ? `<a href="/login.html" class="btn-primary">登录后加入</a>`
                : isJoined
                    ? (circle.creator_id !== getCurrentUserId() ? `<button class="btn-secondary" id="leaveCircleBtn">退出圈子</button>` : `<button class="btn-secondary" disabled>圈主不能退出</button>`)
                    : `<button class="btn-primary" id="joinCircleBtn">加入圈子</button>`;

            const membersHtml = members.slice(0, 20).map(m => {
                const avatarHtml = m.avatar_url
                    ? `<img src="${escapeHtml(m.avatar_url)}" alt="头像">`
                    : `<i class="fas fa-user-circle"></i>`;
                const roleText = m.role === 'creator' ? '创建者' : (m.role === 'admin' ? '管理员' : '成员');
                return `
                    <div class="member-item">
                        <div class="member-avatar">${avatarHtml}</div>
                        <div class="member-info">
                            <div class="member-name">${escapeHtml(m.nickname)}</div>
                            <div class="member-role">${roleText}</div>
                        </div>
                    </div>
                `;
            }).join('');

            const html = `
                <div class="circle-sidebar">
                    <div class="circle-info-card">
                        <div class="circle-cover-large" ${coverStyle}></div>
                        <div class="circle-info-header">
                            ${iconHtml}
                            <div class="circle-title-section">
                                <div class="circle-name-large">${escapeHtml(circle.name)}</div>
                                <div class="circle-creator">创建者：${escapeHtml(circle.creator_nickname)}</div>
                            </div>
                        </div>
                        <div class="circle-desc-large">${escapeHtml(circle.description || '暂无简介')}</div>
                        <div class="circle-stats-large">
                            <span><i class="fas fa-user"></i> ${circle.member_count || 0} 成员</span>
                            <span><i class="fas fa-file-alt"></i> ${circle.post_count || 0} 帖子</span>
                            <span><i class="far fa-calendar-alt"></i> ${formatDate(circle.created_at)}</span>
                        </div>
                        <div class="circle-actions">
                            ${joinLeaveButton}
                        </div>
                    </div>
                    <div class="members-card">
                        <div class="members-title"><i class="fas fa-users"></i> 成员 (${circle.member_count || 0})</div>
                        <div class="members-list">
                            ${membersHtml}
                        </div>
                    </div>
                </div>
                <div class="circle-main">
                    <div class="posts-header">
                        <h2>圈子帖子</h2>
                        <div class="sort-btns">
                            <button class="sort-btn active" data-sort="latest">最新</button>
                            <button class="sort-btn" data-sort="hot">最热</button>
                        </div>
                    </div>
                    <div id="postsList"></div>
                    <div id="pagination" class="pagination"></div>
                    ${token ? `
                        <div class="post-form">
                            <h3>发布帖子</h3>
                            <textarea id="postContent" placeholder="分享你的想法..."></textarea>
                            <button id="submitPostBtn">发布</button>
                            <div id="postError" style="color: #e53e3e; margin-top: 8px;"></div>
                        </div>
                    ` : `<div style="text-align: center; padding: 20px;"><a href="/login.html">登录后可以发帖</a></div>`}
                </div>
            `;
            wrapper.innerHTML = html;

            // 绑定加入/退出事件
            if (token) {
                document.getElementById('joinCircleBtn')?.addEventListener('click', joinCircle);
                document.getElementById('leaveCircleBtn')?.addEventListener('click', leaveCircle);
                document.getElementById('submitPostBtn')?.addEventListener('click', submitPost);
            }

            // 排序切换
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const sort = btn.dataset.sort;
                    if (sort === currentPostSort) return;
                    currentPostSort = sort;
                    currentPostPage = 1;
                    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadPosts();
                });
            });
        }

        function getCurrentUserId() {
            if (!token) return null;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.userId;
            } catch (e) { return null; }
        }

        async function joinCircle() {
            try {
                const res = await fetch(`${window.API_BASE}/circles/${circleId}/join`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    alert('加入成功');
                    loadCircleDetail(parseInt(circleId));
                } else {
                    alert(data.error || '加入失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        async function leaveCircle() {
            if (!confirm('确定要退出该圈子吗？')) return;
            try {
                const res = await fetch(`${window.API_BASE}/circles/${circleId}/leave`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    alert('已退出圈子');
                    loadCircleDetail(parseInt(circleId));
                } else {
                    alert(data.error || '退出失败');
                }
            } catch (err) {
                alert('网络错误');
            }
        }

        async function loadPosts() {
            const container = document.getElementById('postsList');
            container.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${window.API_BASE}/circles/${circleId}/posts?page=${currentPostPage}&limit=10&sort=${currentPostSort}`);
                const data = await res.json();
                const posts = data.posts;
                postTotalPages = data.totalPages;

                if (!posts.length) {
                    container.innerHTML = '<div class="no-posts">暂无帖子，快来发布第一条吧~</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                container.innerHTML = posts.map(post => {
                    const avatarHtml = post.avatar_url
                        ? `<img src="${escapeHtml(post.avatar_url)}" alt="头像">`
                        : `<i class="fas fa-user-circle"></i>`;
                    return `
                        <div class="post-card" data-post-id="${post.id}">
                            <div class="post-header">
                                <span class="post-category">${escapeHtml(post.category || '综合')}</span>
                                <span class="post-time">${formatDate(post.created_at)}</span>
                            </div>
                            <h3 class="post-title">${escapeHtml(post.title)}</h3>
                            <div class="post-content">${escapeHtml(post.content.substring(0, 150))}${post.content.length > 150 ? '...' : ''}</div>
                            <div class="post-footer">
                                <div class="post-author">
                                    ${avatarHtml}
                                    <span>${escapeHtml(post.nickname)}</span>
                                </div>
                                <span><i class="fas fa-eye"></i> ${post.view_count || 0}</span>
                                <span><i class="fas fa-comment"></i> ${post.reply_count || 0}</span>
                                <span><i class="fas fa-heart"></i> ${post.likes || 0}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                // 卡片点击跳转
                document.querySelectorAll('.post-card').forEach(card => {
                    card.addEventListener('click', () => {
                        window.location.href = `/post-detail.html?id=${card.dataset.postId}`;
                    });
                });

                renderPagination();
            } catch (err) {
                container.innerHTML = '<div class="error">加载失败</div>';
            }
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            if (postTotalPages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= postTotalPages; i++) {
                html += `<button class="${i === currentPostPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            container.innerHTML = html;
            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = parseInt(btn.dataset.page);
                    if (page && page !== currentPostPage) {
                        currentPostPage = page;
                        loadPosts();
                    }
                });
            });
        }

        async function submitPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) {
                document.getElementById('postError').innerText = '内容不能为空';
                return;
            }
            try {
                const res = await fetch(`${window.API_BASE}/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: content.substring(0, 30) + (content.length > 30 ? '...' : ''),
                        content: content,
                        category: '综合',
                        circle_id: parseInt(circleId)
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('postContent').value = '';
                    currentPostPage = 1;
                    loadPosts();
                    // 更新圈子信息（帖子数会增加）
                    loadCircleDetail(parseInt(circleId));
                } else {
                    document.getElementById('postError').innerText = data.error || '发布失败';
                }
            } catch (err) {
                document.getElementById('postError').innerText = '网络错误';
            }
        }
    </script>
</body>

</html>
